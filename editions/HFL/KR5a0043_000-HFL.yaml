body:
  text: 九星都呪九曜順行元始徘徊華精瑩明元靈散開流盻无窮降我光輝上投朱景解滯豁懷得馭飛霞騰身紫微人間萬事令我先知五星神呪五星列照煥明五方水星却災木德致昌熒惑消禍太白辟兵鎭星四據家國利亨名刋玉簡字録帝房乗颷扇景飛騰太空出入㝠无遊宴十方五雲覆蓋招神攝風役使萬靈上衛仙翁太陽眞君神呪東望扶桑宫稽首朝鬱儀太陽洞明景寥寥何所思令我拜金色候天望英姿皇華將玉女臨軒降此時太隂眞君神呪仰望顧八表惟月孕隂精中有太素皇夫人駕緑軿耀華光二極混明照三清慇懃求至道五色下來迎木星眞君神呪歳星乗木德展轉耀東郷凌天姿潤澤正色滉明皇尋花歌浩漾擲水詠芝房經時頻禱祝獲福自然長火星眞君神呪芒角森龍鳳威光叱十方丹罡耀五夜朱火焰三邊晶明符正炁劔㦸煥兵權攙搶應滅跡孛彗敢當前金星眞君神呪太白凌清漢騰霜耀素英亭亭浮瑞彩皎皎盛長庚鋒髙能禦宼色潤毎降兵推窮符暦數合道與長生水星眞君神呪妙哉符五炁彷彿見辰門嵯峨當丑位壬癸洞靈君分輝凝皎潔盻蠁赴思存仙歌將舞蹈良乆下金天土星眞君神呪髙穹符戊已藏陸起重霄五行尊暗耀九土見光昭甘石推留伏陶巫算泬寥上仙垂雨露伏地禮空摇羅睺眞君神呪神首循黑道㝠㝠超至靈暗明期朔望陽德晦隂精髙鎭黄旛闕矛㦸耀霜鈴志心俟多福稽首諷眞經計都眞君神呪處暗表隂德豹尾鎭星宫怒指摧山嶽權雄暝太空龍蛇生恠狀變異忽昬朦主人長壽福禳應在恪恭紫炁眞君神呪授制宗元帝含精耀紫微隂陽乗運極幽顯閟靈機玉與登廣漢金鈴歩斗飛四宿循周度九土尊天威月孛眞君神呪太隂光玉緯精𩲸育群生青桂黄華輔鬱羅保素靈毛頭分恠狀彗尾或潜經舍次流災福齋修洞杳㝠三啓頌妙哉三洞響寥寥何鈴鈴尋聲若无有運之不見形響音洞十方聴之不聞聲又大道須人弘遊心歸太空朝禮運十方昇度乗九龍飄飄超三界亦由雲中崇又吾師天中尊超超无上皇仰觀地維表彷彿紫炎堂巍峩玄都室但見仙人房天尊告青羅眞人曰此諸神呪若能䖍心諷誦即得星辰順度疾病消除社稷安寧人民道泰青羅眞人稽首再拜及諸仙衆聞說經呪皆大歡喜作禮而退於是青羅眞人下傳世間推窮曆數信受奉行元始天尊說十一曜大消災神呪經
