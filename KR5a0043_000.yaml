body:
  text: 九星都呪九曜順行元始徘徊華精瑩明元靈散開流盻無窮降我光輝上投朱景解滯豁懷得馭飛霞騰身紫微人間萬事令我先知五星神呪五星列照煥明五方水星却災木德致昌熒惑消禍太白辟兵鎮星四據家國利亨名刋玉簡字録帝房乘颷扇景飛騰太空出入冥無遊宴十方五雲覆蓋招神攝風役使萬靈上衛仙翁太陽真君神呪東望扶桑宫稽首朝鬱儀太陽洞明景寥寥何所思令我拜金色候天望英姿皇華將玉女臨軒降此時太隂真君神呪仰望顧八表惟月孕隂精中有太素皇夫人駕緑軿耀華光二極混明照三清殷勤求至道五色下來迎木星真君神呪歲星乘木德展轉耀東鄉凌天姿潤澤正色滉明皇尋花歌浩漾擲水詠芝房經時頻禱祝獲福自然長火星真君神呪芒角森龍鳳威光叱十方丹罡耀五夜朱火焰三邊晶明符正氣劔戟煥兵權攙搶應滅迹孛彗敢當前金星真君神呪太白凌清漢騰霜耀素英亭亭浮瑞彩皎皎盛長庚鋒髙能禦寇色潤每降兵推窮符曆數合道與長生水星真君神呪妙哉符五氣倣佛見辰門嵯峨當丑位壬癸洞靈君分輝凝皎潔盻蠁赴思存仙歌將舞蹈良久下金天土星真君神呪髙穹符戊已藏陸起重霄五行尊暗耀九土見光昭甘石推留伏陶巫算泬寥上仙垂雨露伏地禮空搖羅睺真君神呪神首循黑道冥冥超至靈暗明期朔望陽德晦隂精髙鎮黃幡闕矛戟耀霜鈴志心俟多福稽首諷真經計都真君神呪處暗表隂德豹尾鎮星宫怒指摧山嶽權雄暝太空龍蛇生怪狀變異忽昏朦主人長壽福禳應在恪恭紫氣真君神呪授制宗元帝含精耀紫微隂陽乘運極幽顯閟靈機玉與登廣漢金鈴步斗飛四宿循周度九土尊天威月孛真君神呪太隂光玉緯精𩲸育群生青桂黃華輔鬱羅保素靈毛頭分怪狀彗尾或潛經舍次流災福齋修洞杳冥三啓頌妙哉三洞響寥寥何鈴鈴尋聲若無有運之不見形響音洞十方聽之不聞聲又大道須人弘遊心歸太空朝禮運十方升度乘九龍飄飄超三界亦由雲中崇又吾師天中尊超超無上皇仰觀地維表倣佛紫炎堂巍峩玄都室但見仙人房天尊告青羅真人曰此諸神呪若能虔心諷誦即得星辰順度疾病消除社稷安寧人民道泰青羅真人稽首再拜及諸仙衆聞説經呪皆大歡喜作禮而退於是青羅真人下傳世間推窮曆數信受奉行元始天尊説十一曜大消災神呪經
