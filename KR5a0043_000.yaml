front:
  text: 元始天尊説十一曜大消災神呪經爾時元始天尊在大羅天上玉京山中騫林樹下鳴大法鼓扣大法鐘普集十方三界諸天諸地日月星宿一切聖衆為説過去未來一切衆生善惡報應災福因緣時於座中有一真人名曰青羅即於座起瞻仰尊顔稽首再拜長跪而言弟子夙生慶幸得遇人天伏遇天尊大慈設大法橋廣為衆生説諸因緣令得開悟普入法門臣今下觀欲界衆生以何因緣四時之中橫遭刑獄一生之內疾病纏綿或分野州縣水火災荒兵戈競起疫疾流行臣今未悟幸望天尊特開慈憫以釋愚蒙天尊隱几而言奇哉青羅能為衆生問諸緣業切以欲界衆生輪回生死沈溺愛河唯務貪生不修正道不知有五行推運十一曜照臨主其災福至如土火留伏金木凌犯羅計勃逆日月薄蝕致以州縣播遷人民災難水火蟲蝗刀兵相犯悉皆由也凡以衆生託蔭為人皆稟隂陽造化或貴或賤或富或貧定分雖殊災福一矣至如帝王國主后妃臣僚係於紫微垣中各有品位五嶽四瀆乃如分野一切人民屬於日月五星臨照吾今示汝下觀星斗看其行度如有五星不順凌犯宫宿照臨帝土及諸分野災難競起疫毒流行兆民死傷速令塑繪十一曜形儀於清淨處建立道傷嚴備香花燈燭請命道士或自持念十一曜大消災神呪經一七日二七日或三七日修齊行道禮念懴悔即得上消天災保鎮帝土下禳毒害以度兆民汝宜聽信轉轉教人受持讀誦青羅真人叩頭再拜上告天尊伏願大慈廣為宣説是時天尊即説十一曜大消災神呪
